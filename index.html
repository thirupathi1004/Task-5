<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Fake Store</title>
    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }

        /* UI Controls */
        .controls { 
            display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; 
            background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow);
        }
        input, select, button { 
            padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; 
        }
        button { cursor: pointer; background: var(--primary); color: white; border: none; transition: 0.2s; }
        button:hover { opacity: 0.9; }

        /* Grid System */
        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Card Design */
        .card {
            background: white; border-radius: 15px; padding: 15px;
            box-shadow: var(--shadow); transition: transform 0.3s, box-shadow 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { transform: scale(1.03); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }
        .card h3 { font-size: 1.1rem; margin: 10px 0; color: #1e293b; }
        .card p { font-size: 0.9rem; color: #64748b; }
        .price-btn { width: 100%; font-weight: bold; margin-top: 10px; }

        /* Status Messages */
        #loader { text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .error { color: var(--danger); text-align: center; font-weight: bold; }

        /* Modal Styles */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center;
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 15px; max-width: 500px; 
            width: 90%; position: relative; 
        }
        .close-modal { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="search-input" placeholder="Search products...">
        <select id="category-filter">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="jewelery">Jewelry</option>
            <option value="men's clothing">Men's Clothing</option>
            <option value="women's clothing">Women's Clothing</option>
        </select>
        <button onclick="sortProducts('asc')">Price: Low to High</button>
        <button onclick="sortProducts('desc')">Price: High to Low</button>
    </div>

    <div id="loader">Loading products...</div>
    <div id="product-grid"></div>

    <div id="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script>
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loader');
        const searchInput = document.getElementById('search-input');
        const categoryFilter = document.getElementById('category-filter');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');

        let allProducts = [];

        // 1. Fetch Data
        async function fetchProducts() {
            try {
                const response = await fetch('https://fakestoreapi.com/products');
                if (!response.ok) throw new Error();
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (error) {
                grid.innerHTML = `<p class="error">Error loading data</p>`;
            } finally {
                loader.style.display = 'none';
            }
        }

        // 2. Display Products (with logic for Title/Desc limits)
        function renderProducts(products) {
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.title}">
                    <h3>${product.title.substring(0, 20)}${product.title.length > 20 ? '...' : ''}</h3>
                    <p>${product.description.substring(0, 60)}...</p>
                    <button class="price-btn">$${product.price}</button>
                    <button style="margin-top:5px; background:#475569" onclick="showDetails(${product.id})">View More</button>
                `;
                grid.appendChild(card);
            });
        }

        // ⭐ Task 2: Search Filter
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(term));
            renderProducts(filtered);
        });

        // ⭐ Task 4: Category Filter
        categoryFilter.addEventListener('change', (e) => {
            const cat = e.target.value;
            const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat);
            renderProducts(filtered);
        });

        // ⭐ Task 3: Price Sorting
        function sortProducts(order) {
            const sorted = [...allProducts].sort((a, b) => 
                order === 'asc' ? a.price - b.price : b.price - a.price
            );
            renderProducts(sorted);
        }

        // ⭐ Task 5: View Details (Modal)
        function showDetails(id) {
            const product = allProducts.find(p => p.id === id);
            modalBody.innerHTML = `
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <img src="${product.image}" style="width:100px">
                <h2>${product.title}</h2>
                <p><strong>Category:</strong> ${product.category}</p>
                <p>${product.description}</p>
                <h3>$${product.price}</h3>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { modal.style.display = 'none'; }
        window.onclick = (e) => { if(e.target == modal) closeModal(); }

        // Initialize
        fetchProducts();
    </script>
</body>
</html>
